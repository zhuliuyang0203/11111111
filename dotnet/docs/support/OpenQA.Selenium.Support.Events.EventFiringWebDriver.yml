  remarks: >-
    <p>

    The ExecuteScript method executes JavaScript in the context of

    the currently selected frame or window. This means that "document" will refer

    to the current document. If the script has a return value, then the following

    steps will be taken:

    </p>

    <p>
      <ul><li>For an HTML element, this method returns a <xref href="OpenQA.Selenium.IWebElement" data-throw-if-not-resolved="false"></xref></li><li>For a number, a <xref href="System.Int64" data-throw-if-not-resolved="false"></xref> is returned</li><li>For a boolean, a <xref href="System.Boolean" data-throw-if-not-resolved="false"></xref> is returned</li><li>For all other cases a <xref href="System.String" data-throw-if-not-resolved="false"></xref> is returned.</li><li>For an array,we check the first element, and attempt to return a
    <xref href="System.Collections.Generic.List%601" data-throw-if-not-resolved="false"></xref> of that type, following the rules above. Nested lists are not

    supported.</li><li>If the value is null or there is no return value,

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> is returned.</li></ul>

    </p>

    <p>

    Arguments must be a number (which will be converted to a <xref href="System.Int64" data-throw-if-not-resolved="false"></xref>),

    a <xref href="System.Boolean" data-throw-if-not-resolved="false"></xref>, a <xref href="System.String" data-throw-if-not-resolved="false"></xref> or a <xref href="OpenQA.Selenium.IWebElement" data-throw-if-not-resolved="false"></xref>,

    or a <xref href="OpenQA.Selenium.IWrapsElement" data-throw-if-not-resolved="false"></xref>.

    An exception will be thrown if the arguments do not meet these criteria.

    The arguments will be made available to the JavaScript via the "arguments" magic

    variable, as if the function were called via "Function.apply"

    </p>
  example: []
  syntax:
    content: public object? ExecuteScript(string script, params object?[] args)
    parameters:
    - id: script
      type: System.String
      description: The JavaScript code to execute.
    - id: args
      type: System.Object[]
      description: The arguments to the script.
    return:
      type: System.Object
      description: The value returned by the script.
    content.vb: Public Function ExecuteScript(script As String, ParamArray args As Object()) As Object
