  assemblies:
  - WebDriver.Support
  namespace: OpenQA.Selenium.Support.UI
  summary: >-
    <p>Represents any abstraction of something that can be loaded.</p>

    <p>This may be an entire web page, or simply a component within that page (such as a login box or menu) or even a service.</p>

    <p>
      <pre><code class="lang-csharp">// Example usage:
      new MyComponent().Load();</code></pre>
    </p>
  remarks: >-
    <p>After the <xref href="OpenQA.Selenium.Support.UI.LoadableComponent%601.Load" data-throw-if-not-resolved="false"></xref> method is called, the component will be loaded and ready for use.</p>

    <p>Overload the protected Load and IsLoaded members to both load a component and determine if the component is already loaded.</p>
  example: []
  syntax:
    content: 'public abstract class LoadableComponent<T> : ILoadableComponent where T : LoadableComponent<T>'
    typeParameters:
    - id: T
      description: The type to be returned (normally the subclass' type)
    content.vb: Public MustInherit Class LoadableComponent(Of T As LoadableComponent(Of T)) Implements ILoadableComponent
