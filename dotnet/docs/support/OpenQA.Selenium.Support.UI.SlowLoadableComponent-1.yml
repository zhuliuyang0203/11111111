  assemblies:
  - WebDriver.Support
  namespace: OpenQA.Selenium.Support.UI
  summary: >-
    <p>A <xref href="OpenQA.Selenium.Support.UI.LoadableComponent%601" data-throw-if-not-resolved="false"></xref> which might not have finished loading when Load() returns.</p>

    <p>After a call to Load(), the IsLoaded property should continue to return false until the component has fully loaded.</p>

    <p>
      <pre><code class="lang-csharp">// Example usage:
      new MySlowComponent().Load();</code></pre>
    </p>
  remarks: Override the HandleErrors() method to check for error conditions which caused <xref href="OpenQA.Selenium.Support.UI.SlowLoadableComponent%601.Load" data-throw-if-not-resolved="false"></xref> to fail.
