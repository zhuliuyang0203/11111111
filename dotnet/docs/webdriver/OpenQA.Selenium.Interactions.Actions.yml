    id: ScrollFromOrigin
    path: ../src/webdriver/Interactions/Actions.cs
    startLine: 555
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Interactions
  summary: Scrolls by provided amount based on a provided origin.
  remarks: >-
    The scroll origin is either the center of an element or the upper left of the viewport plus any offsets.

    If the origin is an element, and the element is not in the viewport, the bottom of the element will first

    be scrolled to the bottom of the viewport.
  example: []
  syntax:
    content: public Actions ScrollFromOrigin(WheelInputDevice.ScrollOrigin scrollOrigin, int deltaX, int deltaY)
    parameters:
    - id: scrollOrigin
      type: OpenQA.Selenium.Interactions.WheelInputDevice.ScrollOrigin
      description: Where scroll originates (viewport or element center) plus provided offsets.
    - id: deltaX
      type: System.Int32
      description: Distance along X axis to scroll using the wheel. A negative value scrolls left.
    - id: deltaY
      type: System.Int32
      description: Distance along Y axis to scroll using the wheel. A negative value scrolls up.
    return:
      type: OpenQA.Selenium.Interactions.Actions
      description: A self-reference to this <xref href="OpenQA.Selenium.Interactions.Actions" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Function ScrollFromOrigin(scrollOrigin As WheelInputDevice.ScrollOrigin, deltaX As Integer, deltaY As Integer) As Actions
  overload: OpenQA.Selenium.Interactions.Actions.ScrollFromOrigin*
  exceptions:
  - type: OpenQA.Selenium.MoveTargetOutOfBoundsException
    commentId: T:OpenQA.Selenium.MoveTargetOutOfBoundsException
    description: If the origin with offset is outside the viewport.
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: If <code class="paramref">scrollOrigin</code> is null.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: If both or either of Viewport and Element are set.
  nameWithType.vb: Actions.ScrollFromOrigin(WheelInputDevice.ScrollOrigin, Integer, Integer)
  fullName.vb: OpenQA.Selenium.Interactions.Actions.ScrollFromOrigin(OpenQA.Selenium.Interactions.WheelInputDevice.ScrollOrigin, Integer, Integer)
  name.vb: ScrollFromOrigin(ScrollOrigin, Integer, Integer)
