    id: Id
    path: ../src/webdriver/WebElement.cs
    startLine: 289
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Gets the ID of the element
  remarks: >-
    This property is internal to the WebDriver instance, and is
        not intended to be used in your code. The element's ID has no meaning
        outside of internal WebDriver usage, so it would be improper to scope
        it as public. However, both subclasses of <xref href="OpenQA.Selenium.WebElement" data-throw-if-not-resolved="false"></xref>
        and the parent driver hosting the element have a need to access the
        internal element ID. Therefore, we have two properties returning the
        same value, one scoped as internal, the other as protected.
  example: []
  syntax:
    content: protected string Id { get; }
    parameters: []
    return:
      type: System.String
    content.vb: Protected ReadOnly Property Id As String
  overload: OpenQA.Selenium.WebElement.Id*
