  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Safari
  summary: Provides a way to access Safari to run your tests by creating a SafariDriver instance
  remarks: >-
    When the WebDriver object has been instantiated the browser will load. The test can then navigate to the URL under test and

    start your test.
  example:
  - >-
    <pre><code class="lang-csharp">[TestFixture]

    public class Testing

    {
        private IWebDriver driver;

        [SetUp]
        public void SetUp()
        {
            driver = new SafariDriver();
        }

        [Test]
        public void TestGoogle()
        {
            driver.Navigate().GoToUrl("http://www.google.co.uk");
            /*
            *   Rest of the test
            */
        }

        [TearDown]
        public void TearDown()
        {
            driver.Quit();
            driver.Dispose();
        }
    }</code></pre>
