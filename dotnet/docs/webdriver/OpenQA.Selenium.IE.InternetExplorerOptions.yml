    id: AddAdditionalInternetExplorerOption
    path: ../src/webdriver/IE/InternetExplorerOptions.cs
    startLine: 255
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.IE
  summary: >-
    Provides a means to add additional capabilities not yet added as type safe options

    for the Internet Explorer driver.
  remarks: >-
    Calling <xref href="OpenQA.Selenium.IE.InternetExplorerOptions.AddAdditionalInternetExplorerOption(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>
        where <code class="paramref">optionName</code> has already been added will overwrite the
        existing value with the new value in <code class="paramref">optionValue</code>.
        Calling this method adds capabilities to the IE-specific options object passed to
        IEDriverServer.exe (property name 'se:ieOptions').
  example: []
  syntax:
    content: public void AddAdditionalInternetExplorerOption(string optionName, object optionValue)
    parameters:
    - id: optionName
      type: System.String
      description: The name of the capability to add.
    - id: optionValue
      type: System.Object
      description: The value of the capability to add.
    content.vb: Public Sub AddAdditionalInternetExplorerOption(optionName As String, optionValue As Object)
  overload: OpenQA.Selenium.IE.InternetExplorerOptions.AddAdditionalInternetExplorerOption*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      thrown when attempting to add a capability for which there is already a type safe option, or

      when <code class="paramref">optionName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or the empty string.
  nameWithType.vb: InternetExplorerOptions.AddAdditionalInternetExplorerOption(String, Object)
  fullName.vb: OpenQA.Selenium.IE.InternetExplorerOptions.AddAdditionalInternetExplorerOption(String, Object)
  name.vb: AddAdditionalInternetExplorerOption(String, Object)
