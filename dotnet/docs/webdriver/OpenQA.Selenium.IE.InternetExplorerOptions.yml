    id: InitialBrowserUrl
    path: ../src/webdriver/IE/InternetExplorerOptions.cs
    startLine: 157
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.IE
  summary: >-
    Gets or sets the initial URL displayed when IE is launched. If not set, the browser launches

    with the internal startup page for the WebDriver server.
  remarks: >-
    By setting the  <xref href="OpenQA.Selenium.IE.InternetExplorerOptions.IntroduceInstabilityByIgnoringProtectedModeSettings" data-throw-if-not-resolved="false"></xref> to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>

    and this property to a correct URL, you can launch IE in the Internet Protected Mode zone. This can be helpful

    to avoid the flakiness introduced by ignoring the Protected Mode settings. Nevertheless, setting Protected Mode

    zone settings to the same value in the IE configuration is the preferred method.
  example: []
  syntax:
    content: public string? InitialBrowserUrl { get; set; }
    parameters: []
    return:
      type: System.String
    content.vb: Public Property InitialBrowserUrl As String
  overload: OpenQA.Selenium.IE.InternetExplorerOptions.InitialBrowserUrl*
