    This property is only valid when setting a <xref href="OpenQA.Selenium.Proxy" data-throw-if-not-resolved="false"></xref>, where the

    <xref href="OpenQA.Selenium.Proxy.Kind" data-throw-if-not-resolved="false"></xref> property is either <xref href="OpenQA.Selenium.ProxyKind.Direct" data-throw-if-not-resolved="false"></xref>,

    <xref href="OpenQA.Selenium.ProxyKind.System" data-throw-if-not-resolved="false"></xref>, or <xref href="OpenQA.Selenium.ProxyKind.Manual" data-throw-if-not-resolved="false"></xref>, and is

    otherwise ignored. Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
