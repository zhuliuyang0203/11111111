    options.IntroduceInstabilityByIgnoringProtectedModeSettings = true;</code></pre>

    <p></p>

    <p>For use with InternetExplorerDriver:</p>

    <p></p>

    <pre><code class="lang-csharp">InternetExplorerDriver driver = new InternetExplorerDriver(options);</code></pre>

