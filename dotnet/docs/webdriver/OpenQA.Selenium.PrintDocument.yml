  summary: Saves this <xref href="OpenQA.Selenium.PrintDocument" data-throw-if-not-resolved="false"></xref> as a PDF formatted file, overwriting the file if it already exists.
  example: []
  syntax:
    content: public override void SaveAsFile(string fileName)
    parameters:
    - id: fileName
      type: System.String
      description: The full path and file name to save the printed document to.
    content.vb: Public Overrides Sub SaveAsFile(fileName As String)
  overridden: OpenQA.Selenium.EncodedFile.SaveAsFile(System.String)
  overload: OpenQA.Selenium.PrintDocument.SaveAsFile*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      <p>If <code class="paramref">fileName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or whitespace.</p>

      <p>-or-</p>

      <p>
        <code class="paramref">fileName</code> refers to a non-file device, such as "con:", "com1:", "lpt1:", etc. in an NTFS environment.</p>
  - type: System.NotSupportedException
    commentId: T:System.NotSupportedException
    description: <code class="paramref">fileName</code> refers to a non-file device, such as "con:", "com1:", "lpt1:", etc. in a non-NTFS environment.
  - type: System.IO.DirectoryNotFoundException
    commentId: T:System.IO.DirectoryNotFoundException
    description: The specified path is invalid, such as being on an unmapped drive.
  - type: System.IO.PathTooLongException
    commentId: T:System.IO.PathTooLongException
    description: The specified path, file name, or both exceed the system-defined maximum length.
