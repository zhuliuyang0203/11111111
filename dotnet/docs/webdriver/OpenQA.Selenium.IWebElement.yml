  summary: Gets the value of a CSS property of this element.
  remarks: >-
    The value returned by the <xref href="OpenQA.Selenium.IWebElement.GetCssValue(System.String)" data-throw-if-not-resolved="false"></xref>
        method is likely to be unpredictable in a cross-browser environment.
        Color values should be returned as hex strings. For example, a
        "background-color" property set as "green" in the HTML source, will
        return "#008000" for its value.
