  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Gets the value of a declared HTML attribute of this element.
  remarks: >-
    As opposed to the <xref href="OpenQA.Selenium.IWebElement.GetAttribute(System.String)" data-throw-if-not-resolved="false"></xref> method, this method

    only returns attributes declared in the element's HTML markup. To access the value

    of an IDL property of the element, either use the <xref href="OpenQA.Selenium.IWebElement.GetAttribute(System.String)" data-throw-if-not-resolved="false"></xref>

    method or the <xref href="OpenQA.Selenium.IWebElement.GetDomProperty(System.String)" data-throw-if-not-resolved="false"></xref> method.
  example: []
  syntax:
    content: string? GetDomAttribute(string attributeName)
    parameters:
    - id: attributeName
      type: System.String
      description: The name of the HTML attribute to get the value of.
    return:
      type: System.String
      description: >-
        The HTML attribute's current value. Returns a <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if the
            value is not set or the declared attribute does not exist.
    content.vb: Function GetDomAttribute(attributeName As String) As String
  overload: OpenQA.Selenium.IWebElement.GetDomAttribute*
  exceptions:
