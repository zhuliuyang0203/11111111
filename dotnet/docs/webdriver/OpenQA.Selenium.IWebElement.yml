  source:
    remote:
      path: dotnet/src/webdriver/IWebElement.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: Click
    path: ../src/webdriver/IWebElement.cs
    startLine: 136
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Clicks this element.
  remarks: >-
    <p>

    Click this element. If the click causes a new page to load, the <xref href="OpenQA.Selenium.IWebElement.Click" data-throw-if-not-resolved="false"></xref>

    method will attempt to block until the page has loaded. After calling the

    <xref href="OpenQA.Selenium.IWebElement.Click" data-throw-if-not-resolved="false"></xref> method, you should discard all references to this

    element unless you know that the element and the page will still be present.

    Otherwise, any further operations performed on this element will have an undefined.

    behavior.

    </p>

    <p>

    If this element is not clickable, then this operation is ignored. This allows you to

    simulate a users to accidentally missing the target when clicking.

    </p>
  example: []
  syntax:
    content: void Click()
    content.vb: Sub Click()
  overload: OpenQA.Selenium.IWebElement.Click*
  exceptions:
  - type: OpenQA.Selenium.StaleElementReferenceException
    commentId: T:OpenQA.Selenium.StaleElementReferenceException
    description: Thrown when the target element is no longer valid in the document DOM.
