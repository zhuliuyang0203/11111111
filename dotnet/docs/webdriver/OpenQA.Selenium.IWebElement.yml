  summary: Defines the interface through which the user controls elements on the page.
  remarks: >-
    The <xref href="OpenQA.Selenium.IWebElement" data-throw-if-not-resolved="false"></xref> interface represents an HTML element.
        Generally, all interesting operations to do with interacting with a page will
        be performed through this interface.
