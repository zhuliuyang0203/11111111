    Gets or sets the asynchronous script timeout, which is the amount

    of time the driver should wait when executing JavaScript asynchronously.

    This timeout only affects the <xref href="OpenQA.Selenium.IJavaScriptExecutor.ExecuteAsyncScript(System.String%2cSystem.Object%5b%5d)" data-throw-if-not-resolved="false"></xref>

    method.
