  name: AddAdditionalEdgeOption(string, object)
  nameWithType: EdgeOptions.AddAdditionalEdgeOption(string, object)
  fullName: OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption(string, object)
  type: Method
  source:
    remote:
      path: dotnet/src/webdriver/Edge/EdgeOptions.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: AddAdditionalEdgeOption
    path: ../src/webdriver/Edge/EdgeOptions.cs
    startLine: 94
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Edge
  summary: >-
    Provides a means to add additional capabilities not yet added as type safe options

    for the Edge driver.
  remarks: >-
    Calling <xref href="OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>
        where <code class="paramref">optionName</code> has already been added will overwrite the
        existing value with the new value in <code class="paramref">optionValue</code>.
        Calling this method adds capabilities to the Edge-specific options object passed to
        WebDriver executable (property name 'ms:edgeOptions').
  example: []
  syntax:
    content: public void AddAdditionalEdgeOption(string optionName, object optionValue)
    parameters:
    - id: optionName
      type: System.String
      description: The name of the capability to add.
    - id: optionValue
      type: System.Object
      description: The value of the capability to add.
    content.vb: Public Sub AddAdditionalEdgeOption(optionName As String, optionValue As Object)
  overload: OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      thrown when attempting to add a capability for which there is already a type safe option, or

      when <code class="paramref">optionName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or the empty string.
  nameWithType.vb: EdgeOptions.AddAdditionalEdgeOption(String, Object)
  fullName.vb: OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption(String, Object)
  name.vb: AddAdditionalEdgeOption(String, Object)
