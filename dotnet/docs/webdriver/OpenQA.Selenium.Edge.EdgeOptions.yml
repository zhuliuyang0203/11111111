- uid: OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption(System.String,System.Object)
  commentId: M:OpenQA.Selenium.Edge.EdgeOptions.AddAdditionalEdgeOption(System.String,System.Object)
  id: AddAdditionalEdgeOption(System.String,System.Object)
  parent: OpenQA.Selenium.Edge.EdgeOptions
