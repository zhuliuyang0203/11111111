  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.DevTools
  summary: Initializes the supplied DevTools session's domains for the specified browser version within the specified number of versions.
  example: []
  syntax:
    content: public static DevToolsDomains InitializeDomains(int protocolVersion, DevToolsSession session, int versionRange)
    parameters:
    - id: protocolVersion
      type: System.Int32
      description: The version of the DevTools Protocol to use.
    - id: session
      type: OpenQA.Selenium.DevTools.DevToolsSession
      description: The <xref href="OpenQA.Selenium.DevTools.DevToolsSession" data-throw-if-not-resolved="false"></xref> for which to initialize the domains.
    - id: versionRange
      type: System.Int32
      description: The range of versions within which to match the provided version number. Defaults to 5 versions.
    return:
      type: OpenQA.Selenium.DevTools.DevToolsDomains
      description: The <xref href="OpenQA.Selenium.DevTools.DevToolsDomains" data-throw-if-not-resolved="false"></xref> object containing the version-specific domains.
    content.vb: Public Shared Function InitializeDomains(protocolVersion As Integer, session As DevToolsSession, versionRange As Integer) As DevToolsDomains
  overload: OpenQA.Selenium.DevTools.DevToolsDomains.InitializeDomains*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: If <code class="paramref">protocolVersion</code> is negative.
  - type: OpenQA.Selenium.WebDriverException
    commentId: T:OpenQA.Selenium.WebDriverException
    description: If the desired protocol version is not in the supported range.
  nameWithType.vb: DevToolsDomains.InitializeDomains(Integer, DevToolsSession, Integer)
  fullName.vb: OpenQA.Selenium.DevTools.DevToolsDomains.InitializeDomains(Integer, OpenQA.Selenium.DevTools.DevToolsSession, Integer)
  name.vb: InitializeDomains(Integer, DevToolsSession, Integer)
