  summary: >-
    Gets or sets the <xref href="OpenQA.Selenium.IFileDetector" data-throw-if-not-resolved="false"></xref> responsible for detecting

    sequences of keystrokes representing file paths and names.
  remarks: >-
    The IE driver does not allow a file detector to be set,
        as the server component of the IE driver (<code>IEDriverServer.exe</code>) only
        allows uploads from the local computer environment. Attempting to set
        this property has no effect, but does not throw an exception. If you
        are attempting to run the IE driver remotely, use <xref href="OpenQA.Selenium.Remote.RemoteWebDriver" data-throw-if-not-resolved="false"></xref>
        in conjunction with a standalone WebDriver server.
