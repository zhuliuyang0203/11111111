  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Tries to add a command to the list of known commands.
  remarks: >-
    This method is used by WebDriver implementations to add additional custom driver-specific commands.

    This method will not overwrite existing commands for a specific name, and will return <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>

    in that case.
  example: []
  syntax:
    content: 'public bool TryAddCommand<T>(string commandName, T commandInfo) where T : CommandInfo'
    parameters:
    - id: commandName
      type: System.String
      description: Name of the command.
    - id: commandInfo
      type: '{T}'
      description: The command information.
    typeParameters:
    - id: T
    return:
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the new command has been added successfully; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Function TryAddCommand(Of T As CommandInfo)(commandName As String, commandInfo As T) As Boolean
  overload: OpenQA.Selenium.CommandInfoRepository.TryAddCommand*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: >-
      <p>If <code class="paramref">commandName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or <xref href="System.String.Empty" data-throw-if-not-resolved="false"></xref>.</p>

