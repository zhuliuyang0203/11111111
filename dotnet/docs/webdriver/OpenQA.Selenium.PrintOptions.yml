  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Adds a range of pages to be included in the document.
  example: []
  syntax:
    content: public void AddPageRangeToPrint(string pageRange)
    parameters:
    - id: pageRange
      type: System.String
      description: A string of the form "x-y" representing the page numbers to include.
    content.vb: Public Sub AddPageRangeToPrint(pageRange As String)
  overload: OpenQA.Selenium.PrintOptions.AddPageRangeToPrint*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      <p>If <code class="paramref">pageRange</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or <xref href="System.String.Empty" data-throw-if-not-resolved="false"></xref>.</p>

      <p>-or-</p>

      <p>If the requested <code class="paramref">pageRange</code> is already included.</p>

      <p>-or-</p>

      <p>If the requested <code class="paramref">pageRange</code> has multiple '-' separators.</p>

      <p>-or-</p>

      <p>If a bound value is neither empty nor a number.</p>
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: >-
      <p>If <code class="paramref">pageRange</code> has a negative lower bound.</p>

      <p>-or-</p>

      <p>If <code class="paramref">pageRange</code> has an upper bound less than the lower bound.</p>
