      repo: https://github.com/SeleniumHQ/selenium
    id: LibraryExtractionPath
    path: ../src/webdriver/IE/InternetExplorerDriverService.cs
    startLine: 74
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.IE
  summary: >-
    Gets or sets the path to which the supporting library of the <code>IEDriverServer.exe</code> is extracted.

    Defaults to the temp directory if this property is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or <xref href="System.String.Empty" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    The <code>IEDriverServer.exe</code> requires extraction of a supporting library to perform some of its functions. Setting

    This library is extracted to the temp directory if this property is not set. If the property is set, it must

    be set to a valid directory.
  example: []
  syntax:
    content: public string? LibraryExtractionPath { get; set; }
    parameters: []
    return:
      type: System.String
    content.vb: Public Property LibraryExtractionPath As String
