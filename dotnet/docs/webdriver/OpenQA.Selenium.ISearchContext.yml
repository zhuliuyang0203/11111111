  summary: >-
    Finds all <xref href="OpenQA.Selenium.IWebElement?text=IWebElements" data-throw-if-not-resolved="false"></xref> within the current context

    using the given mechanism.
  example: []
  syntax:
    content: ReadOnlyCollection<IWebElement> FindElements(By by)
    parameters:
    - id: by
      type: OpenQA.Selenium.By
      description: The locating mechanism to use.
    return:
      type: System.Collections.ObjectModel.ReadOnlyCollection{OpenQA.Selenium.IWebElement}
      description: >-
        A <xref href="System.Collections.ObjectModel.ReadOnlyCollection%601" data-throw-if-not-resolved="false"></xref> of all <xref href="OpenQA.Selenium.IWebElement?text=WebElements" data-throw-if-not-resolved="false"></xref>
            matching the current criteria, or an empty list if nothing matches.
    content.vb: Function FindElements(by As By) As ReadOnlyCollection(Of IWebElement)
