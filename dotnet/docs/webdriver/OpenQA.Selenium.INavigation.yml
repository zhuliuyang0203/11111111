  nameWithType: INavigation.GoToUrl(string)
  fullName: OpenQA.Selenium.INavigation.GoToUrl(string)
  type: Method
  source:
    remote:
      path: dotnet/src/webdriver/INavigation.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: GoToUrl
    path: ../src/webdriver/INavigation.cs
    startLine: 67
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Load a new web page in the current browser window.
  remarks: >-
    Calling the <xref href="OpenQA.Selenium.INavigation.GoToUrl(System.String)" data-throw-if-not-resolved="false"></xref> method will load a new web page in the current browser window.

    This is done using an HTTP GET operation, and the method will block until the

    load is complete. This will follow redirects issued either by the server or

    as a meta-redirect from within the returned HTML. Should a meta-redirect "rest"

    for any duration of time, it is best to wait until this timeout is over, since

    should the underlying page change while your test is executing the results of

    future calls against this interface will be against the freshly loaded page.
  example: []
  syntax:
    content: void GoToUrl(string url)
    parameters:
    - id: url
      type: System.String
      description: The URL to load. It is best to use a fully qualified URL
    content.vb: Sub GoToUrl(url As String)
  overload: OpenQA.Selenium.INavigation.GoToUrl*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: If <code class="paramref">url</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
  nameWithType.vb: INavigation.GoToUrl(String)
  fullName.vb: OpenQA.Selenium.INavigation.GoToUrl(String)
  name.vb: GoToUrl(String)
