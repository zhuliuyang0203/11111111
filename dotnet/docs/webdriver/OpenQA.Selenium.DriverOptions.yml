  source:
    remote:
      path: dotnet/src/webdriver/DriverOptions.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: ImplicitWaitTimeout
    path: ../src/webdriver/DriverOptions.cs
    startLine: 222
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: >-
    Gets or sets the implicit wait timeout, which is the  amount of time the

    driver should wait when searching for an element if it is not immediately

    present.
  remarks: >-
    When searching for a single element, the driver should poll the page

    until the element has been found, or this timeout expires before throwing

    a <xref href="OpenQA.Selenium.NoSuchElementException" data-throw-if-not-resolved="false"></xref>. When searching for multiple elements,

    the driver should poll the page until at least one element has been found

    or this timeout has expired.

    <p>

    Increasing the implicit wait timeout should be used judiciously as it

    will have an adverse effect on test run time, especially when used with

    slower location strategies like XPath.

    </p>
  example: []
  syntax:
    content: public TimeSpan? ImplicitWaitTimeout { get; set; }
    parameters: []
    return:
      type: System.Nullable{System.TimeSpan}
    content.vb: Public Property ImplicitWaitTimeout As TimeSpan?
  overload: OpenQA.Selenium.DriverOptions.ImplicitWaitTimeout*
