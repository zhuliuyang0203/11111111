    startLine: 479
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Chromium
  summary: >-
    Provides a means to add additional capabilities not yet added as type safe options

    for the Chromium driver.
  remarks: >-
    Calling <xref href="OpenQA.Selenium.Chromium.ChromiumOptions.AddAdditionalChromiumOption(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>
        where <code class="paramref">optionName</code> has already been added will overwrite the
        existing value with the new value in <code class="paramref">optionValue</code>.
        Calling this method adds capabilities to the Chromium-specific options object passed to
        webdriver executable (e.g. property name 'goog:chromeOptions').
  example: []
  syntax:
    content: protected void AddAdditionalChromiumOption(string optionName, object optionValue)
    parameters:
    - id: optionName
      type: System.String
      description: The name of the capability to add.
    - id: optionValue
      type: System.Object
      description: The value of the capability to add.
    content.vb: Protected Sub AddAdditionalChromiumOption(optionName As String, optionValue As Object)
  overload: OpenQA.Selenium.Chromium.ChromiumOptions.AddAdditionalChromiumOption*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      thrown when attempting to add a capability for which there is already a type safe option, or

      when <code class="paramref">optionName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or the empty string.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      thrown when attempting to add a capability for which there is already a type safe option, or

      when <code class="paramref">optionName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or the empty string.
