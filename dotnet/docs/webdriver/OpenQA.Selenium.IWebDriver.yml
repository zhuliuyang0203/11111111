  type: Interface
  source:
    remote:
      path: dotnet/src/webdriver/IWebDriver.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: IWebDriver
    path: ../src/webdriver/IWebDriver.cs
    startLine: 46
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Defines the interface through which the user controls the browser.
  remarks: >-
    The <xref href="OpenQA.Selenium.IWebDriver" data-throw-if-not-resolved="false"></xref> interface is the main interface to use for testing, which

    represents an idealized web browser. The methods in this class fall into three categories:

    <ul><li>Control of the browser itself</li><li>Selection of <xref href="OpenQA.Selenium.IWebElement?text=IWebElements" data-throw-if-not-resolved="false"></xref></li><li>Debugging aids</li></ul><p>

    Key properties and methods are <xref href="OpenQA.Selenium.IWebDriver.Url" data-throw-if-not-resolved="false"></xref>, which is used to

    load a new web page by setting the property, and the various methods similar

    to <xref href="OpenQA.Selenium.ISearchContext.FindElement(OpenQA.Selenium.By)" data-throw-if-not-resolved="false"></xref>, which is used to find <xref href="OpenQA.Selenium.IWebElement?text=IWebElements" data-throw-if-not-resolved="false"></xref>.

    </p><p>

    You use the interface by instantiate drivers that implement of this interface.

    You should write your tests against this interface so that you may "swap in" a

    more fully featured browser when there is a requirement for one.

    </p>
  example: []
  syntax:
    content: 'public interface IWebDriver : ISearchContext, IDisposable'
    content.vb: Public Interface IWebDriver Inherits ISearchContext, IDisposable
  inheritedMembers:
  - OpenQA.Selenium.ISearchContext.FindElement(OpenQA.Selenium.By)
  - OpenQA.Selenium.ISearchContext.FindElements(OpenQA.Selenium.By)
  - System.IDisposable.Dispose
  extensionMethods:
