    commentId: M:OpenQA.Selenium.INavigation.GoToUrl(System.String)
  - linkId: OpenQA.Selenium.INavigation.GoToUrl(System.Uri)
    commentId: M:OpenQA.Selenium.INavigation.GoToUrl(System.Uri)
