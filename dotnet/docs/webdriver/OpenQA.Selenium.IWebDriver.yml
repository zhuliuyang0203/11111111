  fullName: OpenQA.Selenium.IWebDriver.Url
  type: Property
  source:
    remote:
      path: dotnet/src/webdriver/IWebDriver.cs
      branch: trunk
      repo: https://github.com/SeleniumHQ/selenium
    id: Url
    path: ../src/webdriver/IWebDriver.cs
    startLine: 62
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: Gets or sets the URL the browser is currently displaying.
  remarks: >-
    Setting the <xref href="OpenQA.Selenium.IWebDriver.Url" data-throw-if-not-resolved="false"></xref> property will load a new web page in the current browser window.

    This is done using an HTTP GET operation, and the method will block until the

    load is complete. This will follow redirects issued either by the server or

    as a meta-redirect from within the returned HTML. Should a meta-redirect "rest"

    for any duration of time, it is best to wait until this timeout is over, since

    should the underlying page change while your test is executing the results of

    future calls against this interface will be against the freshly loaded page.
  example: []
  syntax:
    content: string Url { get; set; }
    parameters: []
    return:
      type: System.String
    content.vb: Property Url As String
  overload: OpenQA.Selenium.IWebDriver.Url*
  seealso:
