  namespace: OpenQA.Selenium.Internal.Logging
  summary: Provides context aware logging functionality for the Selenium WebDriver.
  remarks: >-
    Use the following code to enable logging to console:

    <pre><code class="lang-csharp">Log.SetMinimumLevel(LogEventLevel.Debug)).WithHandler(new ConsoleLogHandler());</code></pre>


    Or enable it per limited execution scope:

    <pre><code class="lang-csharp">using (var ctx = Log.CreateContext(LogEventLevel.Trace))

    {
      // do something
    }</code></pre>
