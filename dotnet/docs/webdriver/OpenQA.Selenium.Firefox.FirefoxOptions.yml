    <p>For use with RemoteWebDriver:</p>

    <p></p>

    <pre><code class="lang-csharp">RemoteWebDriver driver = new RemoteWebDriver(new Uri("http://localhost:4444/wd/hub"), options.ToCapabilities());</code></pre>
