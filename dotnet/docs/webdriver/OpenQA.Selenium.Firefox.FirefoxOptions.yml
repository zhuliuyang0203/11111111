    id: AddAdditionalFirefoxOption
    path: ../src/webdriver/Firefox/FirefoxOptions.cs
    startLine: 253
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Firefox
  summary: >-
    Provides a means to add additional capabilities not yet added as type safe options

    for the Firefox driver.
  remarks: >-
    Calling <xref href="OpenQA.Selenium.Firefox.FirefoxOptions.AddAdditionalFirefoxOption(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>
        where <code class="paramref">optionName</code> has already been added will overwrite the
        existing value with the new value in <code class="paramref">optionValue</code>.
        Calling this method adds capabilities to the Firefox-specific options object passed to
        geckodriver.exe (property name 'moz:firefoxOptions').
  example: []
  syntax:
    content: public void AddAdditionalFirefoxOption(string optionName, object optionValue)
    parameters:
    - id: optionName
      type: System.String
      description: The name of the capability to add.
    - id: optionValue
      type: System.Object
      description: The value of the capability to add.
    content.vb: Public Sub AddAdditionalFirefoxOption(optionName As String, optionValue As Object)
  overload: OpenQA.Selenium.Firefox.FirefoxOptions.AddAdditionalFirefoxOption*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      thrown when attempting to add a capability for which there is already a type safe option, or

      when <code class="paramref">optionName</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or the empty string.
  nameWithType.vb: FirefoxOptions.AddAdditionalFirefoxOption(String, Object)
  fullName.vb: OpenQA.Selenium.Firefox.FirefoxOptions.AddAdditionalFirefoxOption(String, Object)
  name.vb: AddAdditionalFirefoxOption(String, Object)
