  summary: Executes a command with this driver.
  example: []
  syntax:
    content: object? ExecuteCustomDriverCommand(string driverCommandToExecute, Dictionary<string, object> parameters)
    parameters:
    - id: driverCommandToExecute
      type: System.String
      description: The name of the command to execute. The command name must be registered with the command executor, and must not be a command name known to this driver type.
    - id: parameters
      type: System.Collections.Generic.Dictionary{System.String,System.Object}
      description: A <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref> containing the names and values of the parameters of the command.
    return:
      type: System.Object
      description: An object that contains the value returned by the command, if any.
