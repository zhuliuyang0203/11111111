  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium.Support.UI
  summary: Waits until a condition is true or times out.
  example: []
  syntax:
    content: TResult Until<TResult>(Func<T, TResult?> condition)
    parameters:
    - id: condition
      type: System.Func{{T},{TResult}}
      description: A delegate taking a TSource as its parameter, and returning a TResult.
    typeParameters:
    - id: TResult
      description: The type of result to expect from the condition.
    return:
      type: '{TResult}'
      description: >-
        If TResult is a boolean, the method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> when the condition is true, and <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> otherwise.
            If TResult is an object, the method returns the object when the condition evaluates to a value other than <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    content.vb: Function Until(Of TResult)(condition As Func(Of T, TResult)) As TResult
  overload: OpenQA.Selenium.Support.UI.IWait`1.Until*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when TResult is not boolean or an object type.
