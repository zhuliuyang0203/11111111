    id: NewWindow
    path: ../src/webdriver/ITargetLocator.cs
    startLine: 81
  assemblies:
  - WebDriver
  namespace: OpenQA.Selenium
  summary: >-
    Creates a new browser window and switches the focus for future commands

    of this driver to the new window.
  example: []
  syntax:
    content: IWebDriver NewWindow(WindowType typeHint)
    parameters:
    - id: typeHint
      type: OpenQA.Selenium.WindowType
      description: >-
        The type of new browser window to be created.
            The created window is not guaranteed to be of the requested type; if
            the driver does not support the requested type, a new browser window
            will be created of whatever type the driver does support.
    return:
      type: OpenQA.Selenium.IWebDriver
      description: An <xref href="OpenQA.Selenium.IWebDriver" data-throw-if-not-resolved="false"></xref> instance focused on the new browser.
    content.vb: Function NewWindow(typeHint As WindowType) As IWebDriver
  overload: OpenQA.Selenium.ITargetLocator.NewWindow*
